<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业主中心 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="profile.html">业主中心</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="text-center mb-4">👤 业主个人中心</h3>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-4 shadow h-100">
                <h5>我的报修记录</h5>
                <div id="myRepair"></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4 shadow h-100">
                <h5>我的发布（失物/团购）</h5>
                <div id="myPublish"></div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
// 我的报修
function showRepair(){
    const list = getLocalData("repair");
    const box = document.getElementById("myRepair");
    if(list.length === 0){
        box.innerHTML = "<p class='text-muted'>暂无报修记录</p>";
        return;
    }
    let html = "";
    list.slice(0,5).forEach(item=>{
        html += `<div class="border-bottom py-2">
            <p>房号：${item.room}</p>
            <p>类型：${item.type}</p>
            <p>状态：待处理</p>
        </div>`;
    })
    box.innerHTML = html;
}
// 我的发布
function showPublish(){
    const lf = getLocalData("lostFound");
    const buy = getLocalData("groupBuy");
    const box = document.getElementById("myPublish");
    if(lf.length === 0 && buy.length === 0){
        box.innerHTML = "<p class='text-muted'>暂无发布内容</p>";
        return;
    }
    let html = "";
    if(lf.length>0) html += "<p class='fw-bold'>失物招领：</p>";
    lf.slice(0,3).forEach(i=>html += `<p>·${i.goodsType}</p>`);
    if(buy.length>0) html += "<p class='fw-bold mt-2'>团购：</p>";
    buy.slice(0,3).forEach(i=>html += `<p>·${i.title}</p>`);
    box.innerHTML = html;
}
showRepair();
showPublish();
</script>
</body>
</html>
