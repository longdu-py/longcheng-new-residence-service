<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业主投票 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
            </ul>
            <span class="text-light ms-auto" id="nowTime"></span>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h3 class="text-center mb-4">🗳️ 业主线上投票</h3>
    <div id="pollList"></div>

    <div class="mt-5 card p-4 bg-light">
        <h5>发起业主投票</h5>
        <form id="pollForm">
            <div class="mb-3">
                <label>投票主题</label>
                <input type="text" class="form-control" required placeholder="小区绿化改造方案投票">
            </div>
            <div class="mb-3">
                <label>选项1</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>选项2</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>选项3（选填）</label>
                <input type="text" class="form-control">
            </div>
            <div class="mb-3">
                <label>投票说明</label>
                <textarea class="form-control" rows="2"></textarea>
            </div>
            <button class="btn btn-primary w-100">创建投票</button>
        </form>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function renderPoll(){
    const list = getLocalData('poll');
    const wrap = document.getElementById('pollList');
    wrap.innerHTML = '';
    if(list.length === 0){
        wrap.innerHTML = '<div class="alert alert-info">暂无进行中的业主投票</div>';
        return;
    }
    list.forEach((item,idx)=>{
        let optHtml = '';
        item.options.forEach((opt,i)=>{
            optHtml += `
            <div class="form-check">
                <input class="form-check-input poll-radio" type="radio" name="poll${idx}" value="${i}" id="opt${idx}-${i}">
                <label class="form-check-label" for="opt${idx}-${i}">
                    ${opt.name}（${opt.count}票）
                </label>
            </div>
            `;
        })
        wrap.innerHTML += `
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h5>${item.title}</h5>
                <p class="text-muted">${item.desc}</p>
                <div class="my-3">${optHtml}</div>
                <button class="btn btn-sm btn-success vote-btn" data-index="${idx}">提交投票</button>
            </div>
        </div>
        `;
    })

    // 投票按钮事件
    document.querySelectorAll('.vote-btn').forEach(btn=>{
        btn.onclick = function(){
            const pollIdx = Number(this.dataset.index);
            const pollItem = list[pollIdx];
            const radios = document.querySelectorAll(`input[name="poll${pollIdx}"]`);
            let sel = -1;
            radios.forEach((r,i)=>{
                if(r.checked) sel = i;
            })
            if(sel === -1){
                alert('请选择投票选项');
                return;
            }
            pollItem.options[sel].count += 1;
            saveLocalData('poll', list);
            alert('投票成功！刷新查看票数');
            renderPoll();
        }
    })
}
renderPoll();

document.getElementById('pollForm').addEventListener('submit',e=>{
    e.preventDefault();
    const f = e.target;
    const opts = [];
    opts.push({name:f[1].value, count:0});
    opts.push({name:f[2].value, count:0});
    if(f[3].value.trim()) opts.push({name:f[3].value, count:0});
    const data = {
        title: f[0].value,
        options: opts,
        desc: f[4].value,
        time: new Date().toLocaleString('zh-CN')
    };
    saveLocalData('poll', data);
    alert('投票创建完成');
    f.reset();
    renderPoll();
})
</script>
</body>
</html>
