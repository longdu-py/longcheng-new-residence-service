<!DOCTYPE html>
<html lang="zh-CN>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便民商家 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
            </ul>
            <span class="text-light ms-auto" id="nowTime"></span>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h3 class="text-center mb-4">🏪 小区周边便民商家黄页</h3>
    <div class="row g-4" id="merList">
        <!-- 商家卡片自动渲染 -->
    </div>

    <div class="mt-5 card p-4 bg-light">
        <h5>添加便民商家（业主/商户可提交）</h5>
        <form id="merForm">
            <div class="mb-3">
                <label>商家分类</label>
                <select class="form-select" required>
                    <option>超市便利店</option>
                    <option>药店诊所</option>
                    <option>果蔬生鲜</option>
                    <option>家政维修</option>
                    <option>餐饮小吃</option>
                    <option>开锁搬家</option>
                    <option>母婴用品</option>
                    <option>其他服务</option>
                </select>
            </div>
            <div class="mb-3">
                <label>店铺名称</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>店铺地址</label>
                <input type="text" class="form-control" required placeholder="小区南门商铺/周边XX路">
            </div>
            <div class="mb-3">
                <label>联系电话</label>
                <input type="tel" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>营业时间</label>
                <input type="text" class="form-control" placeholder="7:00-22:00">
            </div>
            <div class="mb-3">
                <label>业主专属优惠</label>
                <textarea class="form-control" rows="2" placeholder="小区业主到店享9折等"></textarea>
            </div>
            <button class="btn btn-success w-100">提交商家信息</button>
        </form>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function renderMer(){
    const list = getLocalData('merchant');
    const wrap = document.getElementById('merList');
    wrap.innerHTML = '';
    if(list.length === 0){
        wrap.innerHTML = '<div class="col-12"><div class="alert alert-info">暂无登记便民商家，欢迎商户提交</div></div>';
        return;
    }
    list.forEach(item=>{
        wrap.innerHTML += `
        <div class="col-md-4">
            <div class="card p-3 h-100 shadow-sm">
                <span class="badge bg-primary mb-2">${item.type}</span>
                <h5>${item.name}</h5>
                <p><strong>地址：</strong>${item.addr}</p>
                <p><strong>电话：</strong>${item.phone}</p>
                <p><strong>营业时间：</strong>${item.timeRange}</p>
                <div class="alert alert-success small mt-2">业主优惠：${item.discount}</div>
            </div>
        </div>
        `;
    })
}
renderMer();

document.getElementById('merForm').addEventListener('submit',e=>{
    e.preventDefault();
    const f = e.target;
    const data = {
        type: f[0].value,
        name: f[1].value,
        addr: f[2].value,
        phone: f[3].value,
        timeRange: f[4].value,
        discount: f[5].value,
        time: new Date().toLocaleString('zh-CN')
    };
    saveLocalData('merchant', data);
    alert('商家信息提交成功！');
    f.reset();
    renderMer();
})
</script>
</body>
</html>
