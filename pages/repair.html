<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物业报修 - 龙城新居便民</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="text-center mb-4">物业线上报修</h3>
    <div class="form-box card p-4 shadow">
        <form id="repairForm">
            <div class="mb-3">
                <label>楼栋房号</label>
                <input type="text" class="form-control" placeholder="例：3号楼2单元1502" required>
            </div>
            <div class="mb-3">
                <label>报修类型</label>
                <select class="form-select" required>
                    <option value="">请选择</option>
                    <option>水电故障</option>
                    <option>门窗损坏</option>
                    <option>电梯问题</option>
                    <option>公共区域维修</option>
                    <option>下水道堵塞</option>
                    <option>其他</option>
                </select>
            </div>
            <div class="mb-3">
                <label>问题详细描述</label>
                <textarea class="form-control" rows="4" required></textarea>
            </div>
            <div class="mb-3">
                <label>联系电话</label>
                <input type="tel" class="form-control" required>
            </div>
            <button class="btn btn-primary w-100">提交报修</button>
        </form>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
document.getElementById('repairForm').addEventListener('submit',function(e){
    e.preventDefault();
    alert('报修提交成功！物业会尽快联系您');
    this.reset();
})
</script>
</body>
</html>
