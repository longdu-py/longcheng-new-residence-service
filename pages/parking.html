<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>停车服务 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
            </ul>
            <span class="text-light ms-auto" id="nowTime"></span>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h3 class="text-center mb-4">🅿️ 小区停车服务</h3>
    <div class="card p-4 mb-4 bg-light">
        <h5>停车收费标准</h5>
        <ul>
            <li>业主固定车位：包月 180 元/月</li>
            <li>临时访客车辆：前2小时免费，超出后2元/小时，单日封顶10元</li>
            <li>地下车库固定车位，地上临时车位禁止长期停放</li>
        </ul>
        <h5 class="mt-3">物业车位办理联系</h5>
        <p>物业前台：0393-XXXXXXX | 车位管家：138XXXX8888</p>
    </div>

    <h4>车位转租/出租信息</h4>
    <div id="parkList"></div>

    <div class="mt-5 card p-4 bg-light">
        <h5>发布车位出租/求租</h5>
        <form id="parkForm">
            <div class="mb-3">
                <label>发布类型</label>
                <select class="form-select" required>
                    <option value="出租">自有车位出租</option>
                    <option value="求租">业主求租车位</option>
                </select>
            </div>
            <div class="mb-3">
                <label>车位位置</label>
                <input type="text" class="form-control" required placeholder="地下A区 / 地上1区">
            </div>
            <div class="mb-3">
                <label>期望租金</label>
                <input type="text" class="form-control" required placeholder="例：150元/月">
            </div>
            <div class="mb-3">
                <label>联系电话</label>
                <input type="tel" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>补充说明</label>
                <textarea class="form-control" rows="2"></textarea>
            </div>
            <button class="btn btn-primary w-100">发布车位信息</button>
        </form>
    </div>

    <div class="mt-4 card p-4 border-danger">
        <h5>车辆占道投诉</h5>
        <form id="parkComplaint">
            <div class="mb-3">
                <label>违规车辆位置</label>
                <input type="text" class="form-control" required placeholder="X号楼单元门口消防通道">
            </div>
            <div class="mb-3">
                <label>车牌号码</label>
                <input type="text" class="form-control">
            </div>
            <div class="mb-3">
                <label>问题描述</label>
                <textarea class="form-control" rows="2" required placeholder="占用消防通道、堵塞单元门等"></textarea>
            </div>
            <button class="btn btn-danger w-100">提交占道投诉</button>
        </form>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function renderPark(){
    const list = getLocalData('park');
    const wrap = document.getElementById('parkList');
    wrap.innerHTML = '';
    if(list.length === 0){
        wrap.innerHTML = '<div class="alert alert-info">暂无车位转租信息</div>';
        return;
    }
    list.forEach(item=>{
        let tag = item.mode === '出租'
            ? '<span class="badge bg-success">出租车位</span>'
            : '<span class="badge bg-primary">求租车位</span>';
        wrap.innerHTML += `
        <div class="card mb-3 shadow-sm">
            <div class="card-body">
                ${tag}
                <p><strong>位置：</strong>${item.place}</p>
                <p><strong>租金：</strong>${item.price}</p>
                <p><strong>联系：</strong>${item.phone}</p>
                <p>${item.desc}</p>
                <div class="text-muted small">${item.time}</div>
            </div>
        </div>
        `;
    })
}
renderPark();

// 车位发布
document.getElementById('parkForm').addEventListener('submit',e=>{
    e.preventDefault();
    const f = e.target;
    const data = {
        mode: f[0].value,
        place: f[1].value,
        price: f[2].value,
        phone: f[3].value,
        desc: f[4].value,
        time: new Date().toLocaleString('zh-CN')
    };
    saveLocalData('park', data);
    alert('车位信息发布成功');
    f.reset();
    renderPark();
})

// 占道投诉
document.getElementById('parkComplaint').addEventListener('submit',e=>{
    e.preventDefault();
    alert('占道投诉已提交，安保人员尽快处理');
    e.target.reset();
})
</script>
</body>
</html>
