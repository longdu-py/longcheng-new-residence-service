<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邻里团购 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="group-buy.html">邻里团购</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="text-center mb-4">🥬 邻里生鲜团购</h3>
    <div class="card p-4 mb-5 shadow form-box">
        <h5>发布团购</h5>
        <form id="buyForm">
            <div class="mb-3">
                <label>商品名称</label>
                <input class="form-control" name="title" required>
            </div>
            <div class="mb-3">
                <label>单价</label>
                <input type="number" class="form-control" name="price" required>
            </div>
            <div class="mb-3">
                <label>开团时间 & 自提地点</label>
                <textarea class="form-control" name="addr" required></textarea>
            </div>
            <div class="mb-3">
                <label>团长联系方式</label>
                <input type="tel" class="form-control" name="tel" required>
            </div>
            <button class="btn btn-success w-100">发布团购</button>
        </form>
    </div>
    <h5>当前团购列表</h5>
    <div id="buyList"></div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function renderBuy(){
    const data = getLocalData("groupBuy");
    const box = document.getElementById("buyList");
    box.innerHTML = "";
    if(data.length === 0){
        box.innerHTML = "<div class='alert alert-light'>暂无团购信息</div>";
        return;
    }
    data.forEach(item=>{
        const html = `
            <div class="card mb-3">
                <div class="card-body">
                    <h5>${item.title}</h5>
                    <p class="text-danger">单价：${item.price}元</p>
                    <p>自提/时间：${item.addr}</p>
                    <p class="text-primary">团长：${item.tel}</p>
                </div>
            </div>
        `;
        box.innerHTML += html;
    })
}
renderBuy();

document.getElementById("buyForm").addEventListener("submit",e=>{
    e.preventDefault();
    const f = e.target;
    const obj = {
        title: f.title.value,
        price: f.price.value,
        addr: f.addr.value,
        tel: f.tel.value
    };
    saveLocalData("groupBuy", obj);
    alert("团购发布成功");
    f.reset();
    renderBuy();
})
</script>
</body>
</html>
