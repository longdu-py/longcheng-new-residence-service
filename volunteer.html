<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿者招募 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="volunteer.html">志愿者招募</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="text-center mb-4">🤝 社区志愿者招募</h3>
    <div class="card p-4 shadow mb-4">
        <h5>志愿活动类型</h5>
        <ul>
            <li>垃圾分类劝导值守</li>
            <li>社区敬老帮扶（独居老人上门慰问）</li>
            <li>节日小区活动协助</li>
            <li>安全巡查、文明劝导</li>
        </ul>
    </div>
    <div class="card p-4 shadow form-box">
        <h5>在线报名</h5>
        <form id="volForm">
            <div class="mb-3">
                <label>楼栋房号</label>
                <input class="form-control" name="room" required>
            </div>
            <div class="mb-3">
                <label>姓名</label>
                <input class="form-control" name="name" required>
            </div>
            <div class="mb-3">
                <label>意向志愿项目</label>
                <select class="form-select" name="want" required>
                    <option>垃圾分类值守</option>
                    <option>敬老帮扶</option>
                    <option>活动协助</option>
                    <option>安全巡查</option>
                    <option>均可参与</option>
                </select>
            </div>
            <div class="mb-3">
                <label>联系电话</label>
                <input type="tel" class="form-control" name="tel" required>
            </div>
            <div class="mb-3">
                <label>可参与时间段</label>
                <textarea class="form-control" name="time" placeholder="如：周末全天、工作日晚上"></textarea>
            </div>
            <button class="btn btn-success w-100">提交报名</button>
        </form>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
document.getElementById("volForm").addEventListener("submit",e=>{
    e.preventDefault();
    const f = e.target;
    const obj = {
        room: f.room.value,
        name: f.name.value,
        want: f.want.value,
        tel: f.tel.value,
        time: f.time.value
    };
    saveLocalData("volunteer", obj);
    alert("志愿者报名成功，社区负责人会联系您！");
    f.reset();
})
</script>
</body>
</html>
