<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业主投票 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="poll.html">业主投票</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="text-center mb-4">🗳️ 业主线上投票</h3>
    <div class="card p-4 shadow mb-5">
        <h5>当前投票：小区增设休闲健身器材</h5>
        <form id="pollForm">
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="vote" value="同意" id="v1" required>
                <label class="form-check-label" for="v1">同意，增加健身设施</label>
            </div>
            <div class="form-check mb-2">
                <input class="form-check-input" type="radio" name="vote" value="反对" id="v2">
                <label class="form-check-label" for="v2">反对，占用绿化面积</label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="vote" value="观望" id="v3">
                <label class="form-check-label" for="v3">中立，看方案再决定</label>
            </div>
            <button class="btn btn-primary w-100">提交投票</button>
        </form>
    </div>
    <div class="card p-4 shadow">
        <h5>实时票数统计</h5>
        <div id="pollResult"></div>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
function countPoll(){
    const list = getLocalData("poll");
    let agree = 0, no = 0, mid = 0;
    list.forEach(i=>{
        if(i.vote === "同意") agree++;
        else if(i.vote === "反对") no++;
        else mid++;
    })
    document.getElementById("pollResult").innerHTML = `
        <p>同意：${agree}票</p>
        <p>反对：${no}票</p>
        <p>中立：${mid}票</p>
        <p>总参与：${list.length}位业主</p>
    `;
}
countPoll();

document.getElementById("pollForm").addEventListener("submit",e=>{
    e.preventDefault();
    const val = e.target.vote.value;
    const all = getLocalData("poll");
    // 简单防重复投票
    const phone = prompt("请输入房号验证（仅记录不展示）");
    if(!phone) return;
    const repeat = all.some(i=>i.room === phone);
    if(repeat){
        alert("该房号已投过票，不可重复参与");
        return;
    }
    saveLocalData("poll", {vote:val, room:phone});
    alert("投票成功，感谢参与！");
    countPoll();
})
</script>
</body>
</html>
