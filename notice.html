<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小区公告 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="notice.html">小区公告</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="text-center mb-4">📢 小区官方公告</h3>
    <div class="row mb-4">
        <div class="col-md-6">
            <select id="noticeType" class="form-select">
                <option value="all">全部公告</option>
                <option value="停水停电">停水停电</option>
                <option value="安全通知">安全通知</option>
                <option value="社区活动">社区活动</option>
            </select>
        </div>
        <div class="col-md-6">
            <input type="text" id="searchNotice" class="form-control" placeholder="搜索公告标题">
        </div>
    </div>
    <div id="noticeBox"></div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
let mockData;
window.onload = async function(){
    const res = await fetch("../data/mock.json");
    mockData = await res.json();
    renderNotice(mockData.noticeList);
}

function renderNotice(list){
    const box = document.getElementById("noticeBox");
    box.innerHTML = "";
    list.forEach(item=>{
        const topTag = item.top ? '<span class="badge bg-danger me-2">置顶</span>' : "";
        const html = `
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">${topTag}${item.title}</h5>
                    <span class="badge bg-secondary">${item.type}</span>
                    <p class="text-muted mt-2">发布时间：${item.time}</p>
                    <p class="card-text mt-2">${item.content}</p>
                </div>
            </div>
        `;
        box.innerHTML += html;
    })
}

// 筛选搜索
document.getElementById("noticeType").addEventListener("change", filterNotice);
document.getElementById("searchNotice").addEventListener("input", filterNotice);
function filterNotice(){
    const type = document.getElementById("noticeType").value;
    const key = document.getElementById("searchNotice").value.trim();
    let arr = mockData.noticeList;
    if(type !== "all") arr = arr.filter(i=>i.type === type);
    if(key) arr = arr.filter(i=>i.title.includes(key));
    renderNotice(arr);
}
</script>
</body>
</html>
