<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投诉建议 - 龙城新居便民服务</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand" href="../index.html">🏠 龙城新居便民服务</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html">返回首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="complaint.html">投诉建议</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="text-center mb-4">💬 投诉与意见反馈</h3>
    <div class="card p-4 shadow form-box">
        <form id="comForm">
            <div class="mb-3">
                <label>反馈分类</label>
                <select class="form-select" name="type" required>
                    <option>环境卫生</option>
                    <option>噪音扰民</option>
                    <option>安保管理</option>
                    <option>绿化维护</option>
                    <option>物业服务态度</option>
                    <option>其他建议</option>
                </select>
            </div>
            <div class="mb-3">
                <label>详细描述</label>
                <textarea class="form-control" name="content" rows="4" required></textarea>
            </div>
            <div class="mb-3">
                <label>联系方式（可选，匿名可不填）</label>
                <input type="tel" class="form-control" name="tel">
            </div>
            <button class="btn btn-primary w-100">提交反馈</button>
        </form>
    </div>
</div>

<footer class="bg-dark text-white py-3 mt-5 text-center">
    <small>龙城新居便民平台 ©2026 开源项目</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/app.js"></script>
<script>
document.getElementById("comForm").addEventListener("submit",e=>{
    e.preventDefault();
    const f = e.target;
    const obj = {
        type: f.type.value,
        content: f.content.value,
        tel: f.tel.value || "匿名",
        time: new Date().toLocaleString()
    };
    saveLocalData("complaint", obj);
    alert("反馈提交成功，物业3个工作日内跟进处理");
    f.reset();
})
</script>
</body>
</html>
